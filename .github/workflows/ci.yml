name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --workspace --all-targets

      - name: Test
        run: cargo test --workspace

  integration:
    name: integration demos
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release CLI
        run: cargo build -p mycelium-cli --release

      - name: lattice-remote-demo
        run: ./scripts/lattice-remote-demo.sh
        timeout-minutes: 10

      - name: horizon-demo
        run: ./scripts/horizon-demo.sh
        timeout-minutes: 8

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: demo-logs
          path: |
            /tmp/lat-a.log
            /tmp/lat-b.log
            /tmp/horizon-daemon.log
          if-no-files-found: ignore
